name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    if: github.repository == 'anghunk/Firefly'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm install

      - name: Get package version
        id: package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Get latest release version
        id: release_version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh release view --json tagName --jq '.tagName' 2>/dev/null || echo "v0.0.0")
          # Remove 'v' prefix if present
          LATEST=${LATEST#v}
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest release version: $LATEST"

      - name: Check version changed
        id: check_version
        run: |
          if [ "${{ steps.package_version.outputs.version }}" != "${{ steps.release_version.outputs.version }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed from ${{ steps.release_version.outputs.version }} to ${{ steps.package_version.outputs.version }}"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged, skipping release"
          fi

      - name: Build Tauri app
        if: steps.check_version.outputs.changed == 'true'
        run: npm run tauri:build

      - name: Find built files
        if: steps.check_version.outputs.changed == 'true'
        id: find_files
        run: |
          # Find NSIS installer
          INSTALLER=$(find src-tauri/target/release/bundle/nsis -name "*.exe" -type f | head -n 1)
          echo "installer=$INSTALLER" >> $GITHUB_OUTPUT
          echo "Found installer: $INSTALLER"

          # Get installer filename for release asset name
          INSTALLER_NAME=$(basename "$INSTALLER")
          echo "installer_name=$INSTALLER_NAME" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check_version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.package_version.outputs.version }}
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "## 萤火 v$VERSION

          ### 更新内容
          请查看 commit 历史了解详细变更。

          ### 安装方式
          下载下方的安装程序，运行即可安装。" \
            "${{ steps.find_files.outputs.installer }}"
