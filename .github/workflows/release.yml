name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    if: github.repository == 'anghunk/Firefly'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm install

      - name: Get package.json version
        shell: bash
        run: echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Get latest release version
        shell: bash
        run: |
          curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name' > latest_release.txt

      - name: Compare versions
        shell: bash
        run: |
          if [ "$(cat latest_release.txt)" != "v$PACKAGE_VERSION" ]; then
            echo "Version mismatch"
            echo "create_release=true" >> $GITHUB_ENV
          else
            echo "Version matches"
            echo "create_release=false" >> $GITHUB_ENV
          fi

      - name: Build Tauri app
        if: env.create_release == 'true'
        run: npm run tauri:build

      - name: Find built files
        if: env.create_release == 'true'
        id: find_files
        shell: bash
        run: |
          # Find NSIS installer
          INSTALLER=$(find src-tauri/target/release/bundle/nsis -name "*.exe" -type f | head -n 1)
          echo "installer=$INSTALLER" >> $GITHUB_OUTPUT
          echo "Found installer: $INSTALLER"

      - name: Create Release
        if: env.create_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$PACKAGE_VERSION" \
            --title "v$PACKAGE_VERSION" \
            --notes "## 萤火 v$PACKAGE_VERSION

          ### 更新内容
          请查看 commit 历史了解详细变更。

          ### 安装方式
          下载下方的安装程序，运行即可安装。" \
            "${{ steps.find_files.outputs.installer }}"
